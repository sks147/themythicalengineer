---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.app_name %}
    <p class="post-meta">{{ page.app_name }}</p>
    {% endif %}
    {% if page.last_updated %}
    <p class="post-meta">Last updated: {{ page.last_updated }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
